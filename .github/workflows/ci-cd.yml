name: SWE304 CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # 1. AŞAMA: JAVA DERLEME VE JAR OLUŞTURMA
  # ---------------------------------------------------
  build-java:
    name: 1. Build Java Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      - name: Build JAR File with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: target/*.jar

  # ---------------------------------------------------
  # 2. AŞAMA: DOCKER İMAJI OLUŞTURMA VE YÜKLEME
  # ---------------------------------------------------
  docker-push:
    name: 2. Docker Build & Push
    needs: build-java  # Bu komut, bu aşamanın 1. aşamayı beklemesini sağlar (Oku çizer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: target/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swe304-project3:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/swe304-project3:latest

  # ---------------------------------------------------
  # 3. AŞAMA: AWS SUNUCUSUNA DAĞITIM
  # ---------------------------------------------------
  deploy-aws:
    name: 3. Deploy to AWS
    needs: docker-push  # Bu komut, bu aşamanın 2. aşamayı beklemesini sağlar (Oku çizer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Copy files via SCP (SFTP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "compose.yaml,deploy.sh"
          target: "/home/ec2-user/"

      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x /home/ec2-user/deploy.sh
            /home/ec2-user/deploy.sh ${{ secrets.DOCKERHUB_USERNAME }} ${{ secrets.DOCKERHUB_TOKEN }}