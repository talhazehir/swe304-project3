name: SWE304 CI/CD Pipeline

# This satisfies the requirement to trigger on push or pull request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # This satisfies the software version compliance requirement
      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      # This satisfies Task 2: Making the JAR on GitHub
      - name: Build JAR File with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR Artifact (To verify it worked)
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: target/*.jar
          # This satisfies Task 3: Generate a docker image on GitHub
      - name: Build Docker Image
        run: docker build -t my-spring-app:latest .